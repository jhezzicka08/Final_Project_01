<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hand Crafting</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="logo">
            <i class="fa-solid fa-link"></i> Hand Crafting
        </div>
        <nav>
            <a href="index.html">Home</a>
            <a href="customization.html">Customization</a>
            <a href="shop.html">Shop</a>
            <a href="about.html">About</a>
            <a href="contact.html">Contact</a>
        </nav>
    </header>

    <main class="grid-container">
        <section class="hero-container">
            <div class="hero-image-side">
                <p>“ Each stitch is a quiet <br> reminder that beautiful <br> things take time to <br> create. ”</p>
            </div>
        </section>

        <section class="featured-column">
            <h1 class="section-title">Featured Items</h1>
            
            <div class="item-card horizontal">
                <img src="amigurumi.png" alt="Amigurumi Animal Keychain">
                <div class="item-info">
                    <h2>Amigurumi Animal Keychain</h2>
                    <h2>P120</h2>
                </div>
            </div>

            <div class="item-card vertical">
                <img src="breakfast.png" alt="Breakfast Mini Keychain">
                <div class="item-info">
                    <h2>Breakfast Mini Keychain</h2>
                    <h2>P60</h2>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <div class="footer-content">
            <div class="social-icons">
                <i class="fa-brands fa-facebook"></i>
                <i class="fa-brands fa-tiktok"></i>
            </div>
            <div class="email-section">
                <i class="fa-regular fa-envelope"></i>
                <span class="contact-info">HandCrafting@gmail.com</span>
            </div>
        </div>
    </footer>

</body>
</html>
