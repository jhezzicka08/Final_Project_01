<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hand Crafting - Contact</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="sidebar-layout">
    <header>
        <div class="logo">
            <i class="fa-solid fa-link"></i> Hand Crafting
        </div>
        <nav>
            <a href="index.html">Home</a>
        </nav>
    </header>

    <main>
        <div class="sidebar-image">
             <div class="one-underline" style="border-bottom: 2px solid black; width: 1800px; margin-bottom: 50px;"></div>
            <h2 class="script-heading">Contact</h2>
             <div class="one-underline" style="border-bottom: 2px solid black; width: 1800px; margin-bottom: 50px;"></div>
            <div class="contact-list">
                <div class="contact-box">
                    <div class="icon-container">🪪</div>
                    <span class="script-text">Hand Crafting</span>
                </div>
                <div class="contact-box">
                    <div class="icon-container"><i class="fa-regular fa-envelope"></i></div>
                    <span class="script-text">HandCrafting@gmail.com</span>
                </div>
                <div class="contact-box">
                    <div class="icon-container"><i class="fa-brands fa-facebook"></i></div>
                    <span class="script-text">Hand Crafting</span>
                </div>
                <div class="contact-box">
                    <div class="icon-container"><i class="fa-brands fa-tiktok"></i></div>
                    <span class="script-text">Hand Crafting</span>
                </div>
            </div>
        </div>
    </main>

</html>
